# This is a basic workflow to help you get started with Actions

name: Test and Deploy Website

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [master]
  schedule:
    # Run everyday at 9:00 AM (See https://pubs.opengroup.org/onlinepubs/9699919799/utilities/crontab.html#tag_20_25_07)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Specify the branch name'
        required: true
        default: 'master'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel

permissions:
  contents: read

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3.1.0
        with:
          submodules: recursive

      - uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Get node version
        id: node-version
        run: |
          echo "::set-output name=ver::$(node --version)"

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "::set-output name=dir::$(yarn cache dir)"

      # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
      - uses: actions/cache@v3
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}

      - name: Cache install
        uses: actions/cache@v3
        with:
          path: |
            ./node_modules
            ./doc/node_modules
            ./website/node_modules
            ./blog/node_modules
          key: ${{ runner.os }}-dep-${{ steps.node-version.outputs.ver }}-${{ hashFiles('**/yarn.lock') }}

      - name: Install Dependencies
        run: |
          yarn install

      - name: Get Date
        id: get-date
        run: |
          echo "::set-output name=date::$(/bin/date -u "+%Y%V")"
        shell: bash

      - name: Apply docs cache
        id: docs-cache
        uses: actions/cache@v3
        with:
          path: |
            ./scripts/temp
          key: ${{ runner.os }}-${{ steps.node-version.outputs.ver }}-docs-${{ hashFiles('website/config/apisix-versions.js') }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.node-version.outputs.ver }}-docs-${{ hashFiles('website/config/apisix-versions.js') }}

      - name: Sync documents
        run: |
          yarn prepare-data && git status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply docusaurus cache
        id: docusaurus-cache
        uses: actions/cache@v3
        with:
          path: |
            ./website/.docusaurus
            ./website/build
            ./doc/.docusaurus
            ./doc/build
            ./blog/en/.docusaurus
            ./blog/en/build
            ./blog/zh/.docusaurus
            ./blog/zh/build
          key: ${{ runner.os }}-dep-${{ steps.node-version.outputs.ver }}-docusaurus-${{ hashFiles('website/config/apisix-versions.js') }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-dep-${{ steps.node-version.outputs.ver }}-docs-${{ hashFiles('website/config/apisix-versions.js') }}

      - name: Build
        run: |
          yarn build

      - name: Show build logs on failure
        if: failure()
        run: |
          LOG_DIR="/tmp/apisix-website-build-logs"
          if [ -d "$LOG_DIR" ]; then
            echo "Build logs:"
            for logfile in "$LOG_DIR"/*.log; do
              if [ -f "$logfile" ]; then
                echo ""
                echo "========== $(basename $logfile .log) =========="
                cat "$logfile"
              fi
            done
          else
            echo "No log directory found at $LOG_DIR"
          fi

      - name: Upload build logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/apisix-website-build-logs/
          retention-days: 7
          if-no-files-found: warn

      # Guards the canonical contract of versioned doc pages (see
      # doc/src/theme/LayoutHead/index.tsx): versioned pages must carry exactly
      # one canonical pointing at the version-less latest URL, and canonicals
      # embedded in the doc markdown itself must still win.
      - name: Assert canonical contract
        run: |
          f=$(ls website/build/docs/apisix/3.*/plugins/cors/index.html | head -1)
          test "$(grep -o 'rel="canonical"' "$f" | wc -l)" -eq 1
          grep -q 'rel="canonical" href="https://apisix.apache.org/docs/apisix/plugins/cors/"' "$f"
          grep -q 'rel="canonical" href="https://docs.api7.ai/hub/cors"' website/build/docs/apisix/plugins/cors/index.html

      - name: Update sitemap.xml
        run: |
          yarn update-sitemap && git status

      # ---- Static migration (waves 1-2) --------------------------------------
      # Wave 1: the landing pages (/ and /zh/). Wave 2: the content subtrees
      # whose markdown lives in THIS repo — blog (EN+ZH), learning-center,
      # articles, events/archive. Everything else is still produced by
      # Docusaurus. Runs last, after every Node 16 Docusaurus step (build,
      # canonical assert, sitemap), so switching to Node 22 never touches the
      # Docusaurus toolchain. See next/MIGRATION.md.
      - name: Set up Node.js 22 for the Astro build
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build the Astro pages
        working-directory: next
        run: |
          npm ci
          # Blog/learning-center/articles markdown is synced from this very
          # checkout (WEBSITE_REPO); project docs stay un-synced until wave 3.
          WEBSITE_REPO="$GITHUB_WORKSPACE" node scripts/sync-content.mjs
          npx astro build

      - name: Assert URL parity for the wave-2 subtrees
        run: |
          set -euo pipefail
          # Every URL Docusaurus produced under a migrated prefix must exist in
          # the Astro build too (same index.html path). Astro may add pages
          # (blog tag pages are deliberately additive); it must never drop one.
          ROOT="$PWD"
          fail=0
          for prefix in blog zh/blog learning-center zh/learning-center articles zh/articles events zh/events; do
            [ -d "website/build/$prefix" ] || continue
            missing=$(cd "website/build/$prefix" && find . -name index.html | sort | while read -r f; do
              [ -f "$ROOT/next/dist/$prefix/$f" ] || echo "$prefix/$f"
            done)
            if [ -n "$missing" ]; then
              echo "MISSING in Astro build:"; echo "$missing"; fail=1
            fi
            # Non-HTML files (feeds today) must either already be in the Astro
            # tree or be handled by the feed-carry step below — anything else
            # would be silently dropped by the subtree replacement.
            unhandled=$(cd "website/build/$prefix" && find . -type f ! -name index.html | sort | while read -r f; do
              case "$prefix/${f#./}" in
                learning-center/atom.xml|learning-center/rss.xml|articles/atom.xml|articles/rss.xml|\
                zh/learning-center/atom.xml|zh/learning-center/rss.xml|zh/articles/atom.xml|zh/articles/rss.xml) ;;
                *) [ -f "$ROOT/next/dist/$prefix/$f" ] || echo "$prefix/$f" ;;
              esac
            done)
            if [ -n "$unhandled" ]; then
              echo "NON-HTML files not in the Astro tree and not in the feed-carry list:"; echo "$unhandled"; fail=1
            fi
          done
          exit $fail

      - name: Carry the Docusaurus RSS/atom feeds into the Astro tree
        run: |
          set -euo pipefail
          # Docusaurus generates subscription feeds for these sections; the
          # Astro build does not (yet). Copy them into the Astro tree so the
          # subtree replacement below keeps the feed URLs alive.
          for f in learning-center/atom.xml learning-center/rss.xml \
                   articles/atom.xml articles/rss.xml \
                   zh/learning-center/atom.xml zh/learning-center/rss.xml \
                   zh/articles/atom.xml zh/articles/rss.xml; do
            cp "website/build/$f" "next/dist/$f"
          done

      - name: Overlay the Astro pages onto the Docusaurus build
        run: |
          set -euo pipefail
          # Path allowlist: the landing pages, the wave-2 content subtrees, and
          # the shared Astro asset dir come from the Astro build. Everything
          # else in website/build (docs, plugins, sitemaps, .htaccess, robots)
          # is left as Docusaurus produced it, so those URLs stay byte-identical.
          for path in index.html zh/index.html _astro \
                      blog zh/blog learning-center zh/learning-center \
                      articles zh/articles events zh/events; do
            rm -rf "website/build/$path"
            mkdir -p "website/build/$(dirname "$path")"
            cp -R "next/dist/$path" "website/build/$path"
          done
          # Fail the deploy if the landing pages are not the Astro build, or
          # if the homepage lost its stylesheet link.
          grep -q 'The same gateway, now for your LLM traffic' website/build/index.html
          grep -q '同一个网关' website/build/zh/index.html
          grep -q '/_astro/.*\.css' website/build/index.html
          test -d website/build/_astro
          # Wave-2 sanity: key subtree landmarks exist.
          test -f website/build/blog/index.html
          test -f website/build/zh/blog/index.html
          test -f website/build/blog/tags/index.html
          test -f website/build/learning-center/index.html
          test -f website/build/learning-center/atom.xml
          test -f website/build/articles/index.html
          test -f website/build/zh/articles/rss.xml
          test -f website/build/events/archive/index.html
          # Merge the homepage's image assets (integration brand icons, feature
          # infographics, architecture diagram) into the Docusaurus img tree.
          # cp merges: it adds the new files and overwrites only same-named
          # logos with byte-identical copies, leaving every other image intact.
          mkdir -p website/build/img
          cp -R next/dist/img/. website/build/img/
          test -f website/build/img/infographs/performance.svg
          test -f website/build/img/integrations/icon-prometheus.svg
          test -f website/build/img/architecture.svg

      - name: Deploy to Netlify
        uses: ./.github/actions/actions-netlify
        if: ${{ false }}
        with:
          publish-dir: './website/build'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: '${{ github.event.pull_request.title }}, Deploy from GitHub Actions'
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3.9.0
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'schedule'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/build
          publish_branch: asf-site
          force_orphan: true
